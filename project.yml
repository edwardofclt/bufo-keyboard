name: BufoKeyboard
options:
  bundleIdPrefix: fun.bufo
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

targets:
  BufoKeyboard:
    type: application
    platform: iOS
    preBuildScripts:
      - name: Generate Bufo Index
        script: python3 "$SRCROOT/Scripts/generate-bufo-index.py"
        basedOnDependencyAnalysis: false
    sources:
      - path: BufoKeyboard
      - path: Shared
      - path: Bufos
        type: folder
      - path: LICENSE
        optional: true
      - path: NOTICE
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edwardofclt.bufoKeyboard
        PRODUCT_NAME: "Bufo Keyboard"
        INFOPLIST_FILE: BufoKeyboard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"BufoKeyboard/Preview Content\""
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: BufoKeyboardExtension
      - target: BufoMessagesExtension

  BufoKeyboardExtension:
    type: app-extension
    platform: iOS
    preBuildScripts:
      - name: Generate Bufo Index
        script: python3 "$SRCROOT/Scripts/generate-bufo-index.py"
        basedOnDependencyAnalysis: false
    sources:
      - path: BufoKeyboardExtension
      - path: Shared
      - path: Bufos
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edwardofclt.bufoKeyboard.keyboard
        PRODUCT_NAME: "Bufo Stickers"
        INFOPLIST_FILE: BufoKeyboardExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO

  BufoMessagesExtension:
    type: app-extension.messages
    platform: iOS
    preBuildScripts:
      - name: Generate Bufo Index
        script: python3 "$SRCROOT/Scripts/generate-bufo-index.py"
        basedOnDependencyAnalysis: false
    sources:
      - path: BufoMessagesExtension
      - path: Shared
      - path: Bufos
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edwardofclt.bufoKeyboard.messages
        PRODUCT_NAME: "Bufo Messages"
        INFOPLIST_FILE: BufoMessagesExtension/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: "iMessage App Icon"
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO

  BufoKeyboardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BufoKeyboardUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edwardofclt.bufoKeyboard.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: BufoKeyboard
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: BufoKeyboard
